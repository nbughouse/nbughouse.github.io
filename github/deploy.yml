name: Deploy to VM

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: SSH into VM, build, and reload
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.VM_SSH_KEY }}
                  script: |
                      cd /opt/Bughouse
                      sudo git pull origin main
                      sudo npm ci
                      sudo npm run build
                      sudo systemctl restart bughouse
