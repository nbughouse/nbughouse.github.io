name: Deploy Frontend to GitHub Pages

on:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: github-pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'https://nbughouse.duckdns.org' }}
            VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || (github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name)) }}
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9.15.9
                  run_install: false

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm run build:pages

            - uses: actions/upload-pages-artifact@v4
              with:
                  path: dist/public

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
